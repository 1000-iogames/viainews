name: AI db Leo Auto-Update

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update-database:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute AI Scraper
        run: python scraper.py

      - name: Commit and push JSON
        run: |
          # Configure bot identity
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. Add and commit the changes FIRST
          git add news.json
          git diff-index --quiet HEAD || git commit -m "Automated AI database sync"
          
          # 2. THEN pull any updates to avoid conflicts
          git pull origin main --rebase
          
          # 3. FINALLY push to the live database
          git push
